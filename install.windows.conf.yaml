# Windows-specific configuration (PowerShell)
# Run via: .\install.ps1 (which loads this after install.conf.yaml)
# Requires: admin shell (for symlinks), winget, python
#
# install.ps1 exports %DOCUMENTS% (via GetFolderPath) before invoking dotbot,
# so link paths can reference it regardless of OneDrive redirection.

- defaults:
    link:
        create: true
        relink: true

- link:
    "%DOCUMENTS%\\WindowsPowerShell\\Microsoft.PowerShell_profile.ps1": profile.ps1
    "%LOCALAPPDATA%\\Packages\\Microsoft.WindowsTerminal_8wekyb3d8bbwe\\LocalState\\settings.json": windows/terminal/settings.json
    "%APPDATA%\\Microsoft\\Windows\\Start Menu\\Programs\\Startup\\startup.ahk": windows/ahk/startup.ahk
    ~/.config/powertoys/settings: windows/powertoys/settings
    ~/.local/bin/Sync-PowerToysSettings.ps1: windows/powertoys/Sync-PowerToysSettings.ps1

- shell:
    - command: git submodule update --init --recursive
      description: Installing submodules
    - command: git config core.hooksPath .githooks
      description: Setting up git hooks

    # Desktop tools (winget wrapper handles "already up-to-date" exit code)
    - command: powershell -NoProfile -File windows\bin\winget-install.ps1 -PackageId AutoHotkey.AutoHotkey
      description: Installing AutoHotkey
    - command: powershell -NoProfile -File windows\bin\winget-install.ps1 -PackageId Microsoft.PowerToys
      description: Installing PowerToys
    - command: powershell -NoProfile -File windows\bin\winget-install.ps1 -PackageId Mozilla.Firefox
      description: Installing Firefox
    - command: powershell -NoProfile -File windows\bin\winget-install.ps1 -PackageId Microsoft.VisualStudioCode
      description: Installing VS Code

    # CLI tools
    - command: powershell -NoProfile -File shell\plugins\fzf\install.ps1
      description: Installing fzf
    - command: powershell -NoProfile -File windows\bin\winget-install.ps1 -PackageId Schniz.fnm
      description: Installing fnm
    - command: powershell -NoProfile -File windows\bin\winget-install.ps1 -PackageId Neovim.Neovim
      description: Installing Neovim
    - command: powershell -NoProfile -File windows\bin\winget-install.ps1 -PackageId astral-sh.uv
      description: Installing uv
    - command: powershell -NoProfile -File windows\bin\winget-install.ps1 -PackageId GitHub.cli
      description: Installing GitHub CLI
    - command: powershell -NoProfile -File windows\bin\winget-install.ps1 -PackageId BurntSushi.ripgrep.MSVC
      description: Installing ripgrep

    # Node.js / npm (scripts refresh PATH and activate fnm)
    - command: powershell -NoProfile -File powershell\plugins\node\install.ps1
      description: Installing Node.js LTS
    - command: powershell -NoProfile -File powershell\plugins\opencode\install.ps1
      description: Installing opencode

    - command: powershell -NoProfile -File powershell\plugins\push-notify\install.ps1
      description: Installing push-notify

    - command: powershell -NoProfile -File powershell\plugins\fonts\install.ps1
      description: Installing fonts

    # PowerShell modules (bootstraps PackageManagement if needed)
    - command: powershell -NoProfile -File powershell\plugins\psfzf\install.ps1
      description: Installing PSFzf

    # Post-link actions
    - command: >-
        powershell -NoProfile -Command
        "Start-Process '%APPDATA%\Microsoft\Windows\Start Menu\Programs\Startup\startup.ahk' -ArgumentList '/restart'"
      description: Restarting AHK startup script

    # PowerToys settings
    - command: powershell -NoProfile -Command "Sync-PowerToysSettings"
      description: Applying PowerToys settings

    # Cleanup
    - command: powershell -NoProfile -File powershell\plugins\debloat\cleanup.ps1
      description: Removing bloatware
