# Common configuration for both Unix and Windows platforms
# Platform-specific configs: install.unix.conf.yaml, install.windows.conf.yaml

- defaults:
    link:
        create: true
        relink: true

- clean: ['~']

- link:
    # Git configuration
    ~/.config/git: git

    # SSH configuration
    ~/.ssh/config: ssh/config

    # Editor configuration (nvim depends on vim/)
    ~/.vim:
    ~/.config/nvim: nvim

    # AI tools
    ~/.claude/settings.json: claude/settings.json
    ~/.claude/keybindings.json: claude/keybindings.json
    ~/.config/opencode: opencode

    # Python configuration
    ~/.config/python: python
    ~/.pdbrc:

    # Node.js configuration
    ~/.config/npm: npm

    # Jupyter
    ~/.config/jupyter: jupyter
    ~/.local/share/jupyter/nbextensions: jupyter/nbextensions

    # Dotfiles self-reference
    ~/.dotfiles: ''
