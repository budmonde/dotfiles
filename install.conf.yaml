# Cross-platform configuration
# Platform-specific: install.unix.conf.yaml, install.windows.conf.yaml

- defaults:
    link:
        create: true
        relink: true

- clean: ['~', '~/.config']

- link:
    # Git / SSH
    ~/.config/git: git
    ~/.ssh/config: ssh/config

    # Editors
    ~/.vim:
    ~/.config/nvim: nvim

    # AI tools
    ~/.config/claude/settings.json: claude/settings.json
    ~/.config/claude/keybindings.json: claude/keybindings.json
    ~/.config/opencode: opencode

    # Languages
    ~/.config/python: python
    ~/.pdbrc: python/pdbrc
    ~/.config/npm: npm
    ~/.config/jupyter: jupyter
    $XDG_DATA_HOME/jupyter/nbextensions:
        path: jupyter/nbextensions
        if: '[ -n "$XDG_DATA_HOME" ]'
    ~/.local/share/jupyter/nbextensions:
        path: jupyter/nbextensions
        if: '[ -z "$XDG_DATA_HOME" ]'

    # Misc
    ~/.config/readline: readline

    # Personal bin scripts
    ~/.local/bin/git-fetch-repos: bin/git-fetch-repos
    ~/.local/bin/git-filter-repo: bin/git-filter-repo
    ~/.local/bin/reddit: bin/reddit
    ~/.local/bin/set-title: bin/set-title
