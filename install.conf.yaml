- defaults:
    link:
        create: true
        relink: true

- clean: ['~']

- link:
    ~/.bash:
    ~/.bash_profile:
    ~/.bashrc:
    ~/.condarc:
    ~/.dotfiles: ''
    ~/.gitconfig:
    ~/.gitconfig-crlf:
    ~/.gitignore:
    ~/.inputrc:
    ~/.jupyter:
    ~/.local/share/jupyter/nbextensions: jupyter/nbextensions
    ~/.pdbrc:
    ~/.pythonrc:
    ~/.shell:
    ~/.ssh/config: ssh/config
    ~/.tmux.conf:
    ~/.tmux/plugins/tpm: tmux/plugins/tpm
    ~/.vim:
    ~/.config/nvim: nvim
    ~/.config/opencode: opencode
    ~/.zsh:
    ~/.zshenv:
    ~/.zshrc:

- shell:
    - [git submodule update --init --recursive, Installing submodules]
    - [git config core.hooksPath .githooks, Setting up git hooks]
    - [./shell/plugins/fzf/install --bin, Installing fzf binary]
    - [./shell/plugins/miniconda3/install, Installing miniconda]
    - [./shell/plugins/texlive/install, Installing texlive]
    - ['[ -s "$HOME/.shell/plugins/nvm/nvm.sh" ] && . "$HOME/.shell/plugins/nvm/nvm.sh" && nvm install --lts', Installing Node LTS via nvm]
    - ['[ -n "$WSL_DISTRO_NAME" ] && sudo systemctl mask --now systemd-timesyncd 2>/dev/null || true', Disabling timesyncd on WSL]
    - [./windows/ahk/install, Installing Windows AHK startup script]
