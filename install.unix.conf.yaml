# Unix-specific configuration (Linux, macOS, WSL)
# Run via: ./install (which loads this after install.conf.yaml)

- defaults:
    link:
        create: true
        relink: true

- link:
    # Root rc files (required by shell spec)
    ~/.bash_profile:
    ~/.bashrc:
    ~/.profile:
    ~/.zshenv:
    ~/.zshrc:

    # Shell
    ~/.config/bash: bash
    ~/.config/zsh: zsh
    ~/.config/shell: shell
    ~/.config/tmux: tmux

- shell:
    - [git submodule update --init --recursive, Installing submodules]
    - [git config core.hooksPath .githooks, Setting up git hooks]
    - ['for h in commit-msg post-commit; do ln -sfn "$HOME/.config/git/hooks/$h" ".githooks/$h"; done', Linking global git hooks into .githooks]
    - ['chmod +x git/hooks/commit-msg git/hooks/post-commit 2>/dev/null || true', Marking global hook scripts executable]

    # CLI tools
    - [./shell/plugins/fzf/install --bin, Installing fzf]
    - [./shell/plugins/fnm/install, Installing fnm]
    - ['${XDG_DATA_HOME:-$HOME/.local/share}/fnm/fnm install --lts && ${XDG_DATA_HOME:-$HOME/.local/share}/fnm/fnm default lts-latest || true', Installing Node LTS]
    - ['eval "$(${XDG_DATA_HOME:-$HOME/.local/share}/fnm/fnm env --shell bash)" && cd git/hooks && npm install --silent --no-audit --no-fund', Installing git hook dependencies]
    - [./shell/plugins/nvim/install, Installing neovim]
    - ['curl -LsSf https://astral.sh/uv/install.sh | UV_INSTALL_DIR="$HOME/.local/bin" UV_NO_MODIFY_PATH=1 sh', Installing uv]
    - [./shell/plugins/gh/install, Installing GitHub CLI]
    - [./shell/plugins/rg/install, Installing ripgrep]
    - [./shell/plugins/rclone/install, Installing rclone]
    - [./shell/plugins/push-notify/install, Installing push-notify]

# Symlinks for binaries installed above
- link:
    ~/.local/bin/fzf: shell/plugins/fzf/bin/fzf
